# ─────────────────────────────────────────────────────────────────
# VPS Master Stack — Production Overlay (Traefik + HTTPS)
# ─────────────────────────────────────────────────────────────────
# Adds Traefik as the single entry point with automatic Let's Encrypt
# SSL. Every service gets its own subdomain. Postgres is locked
# to the internal network only.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Required env vars in .env.local:
#   DOMAIN                  your root domain (e.g. mycompany.com)
#   ACME_EMAIL              email for Let's Encrypt notifications
#   POSTGRES_PASSWORD       strong database password
#   AUTH_SECRET             nextauth secret (openssl rand -hex 32)
#   CRON_SECRET             cron auth token (openssl rand -hex 32)
#   N8N_ENCRYPTION_KEY      n8n secret (openssl rand -hex 32)
#   N8N_BASIC_AUTH_PASSWORD n8n admin password
#
# DNS records needed:
#   A   @               → YOUR_VPS_IP   (root domain)
#   A   *               → YOUR_VPS_IP   (wildcard — covers all subdomains)
#
# Subdomain layout:
#   app.DOMAIN      → Agent Dashboard (chat + file manager + agent teams)
#   n8n.DOMAIN      → n8n Automation
#   files.DOMAIN    → FileBrowser (external file access)
#   manage.DOMAIN   → Portainer
#   DOMAIN / www    → Nginx (your company website + client sites)
#
# NOTE: Open WebUI removed — AgentPlayground chat IS the Ollama interface.
# ─────────────────────────────────────────────────────────────────

services:

  # ── Traefik (reverse proxy + automatic HTTPS) ─────────────────
  traefik:
    image: traefik:v3.0
    container_name: vps-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    command:
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Auto-redirect HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Docker provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      # Let's Encrypt (TLS challenge)
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    networks:
      - proxy

  # ── Dashboard → https://app.DOMAIN ───────────────────────────
  dashboard:
    ports: !reset []
    environment:
      - NEXT_PUBLIC_APP_URL=https://app.${DOMAIN}
      - NEXTAUTH_URL=https://app.${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.dashboard.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.tls.certresolver=le
      - traefik.http.services.dashboard.loadbalancer.server.port=3000
      # Increase timeout for AI streaming responses
      - traefik.http.middlewares.dashboard-timeout.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.dashboard.middlewares=dashboard-timeout
    networks:
      - default
      - proxy

  # ── n8n → https://n8n.DOMAIN ──────────────────────────────────
  n8n:
    ports: !reset []
    environment:
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=le
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    networks:
      - default
      - proxy

  # ── Nginx → https://DOMAIN + https://www.DOMAIN ──────────────
  # Also hosts client sites via virtual hosts (add to sites/*.conf)
  nginx:
    ports: !reset []
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.nginx.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      - traefik.http.routers.nginx.entrypoints=websecure
      - traefik.http.routers.nginx.tls=true
      - traefik.http.routers.nginx.tls.certresolver=le
      - traefik.http.services.nginx.loadbalancer.server.port=80
    networks:
      - default
      - proxy

  # ── FileBrowser → https://files.DOMAIN ───────────────────────
  filebrowser:
    ports: !reset []
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.filebrowser.rule=Host(`files.${DOMAIN}`)
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.routers.filebrowser.tls.certresolver=le
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
    networks:
      - default
      - proxy

  # ── Portainer → https://manage.DOMAIN ────────────────────────
  portainer:
    ports: !reset []
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.portainer.rule=Host(`manage.${DOMAIN}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=le
      - traefik.http.services.portainer.loadbalancer.server.port=9000
    networks:
      - default
      - proxy

  # ── Postgres — internal only in production ────────────────────
  postgres:
    ports: !reset []

volumes:
  traefik-certs:

networks:
  proxy:
    name: traefik-proxy
    driver: bridge
